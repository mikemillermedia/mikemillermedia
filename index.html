<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Complete Digital Production for Brands with a Vision.">
    <title>YOUR CREATIVE PARTNER | Portfolio</title>
    
    <style>
        /* Base Dark Theme & Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050507; 
            color: #f5f5f7; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --accent-color: #6B5B95; 
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* === Top Navigation Header === */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem 2rem 1rem;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        /* === 80% Top Hero Video Section === */
        .hero-section {
            height: 80vh;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            margin-bottom: 2rem;
            display: flex;
            align-items: center; /* Centers text vertically */
            justify-content: center; /* Centers text horizontally */
            text-align: center;
        }

        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.5; /* Dimmed enough to make white text pop perfectly */
        }

        /* Clean White Text Overlay */
        .hero-text-overlay {
            position: relative;
            z-index: 1;
            padding: 2rem;
            max-width: 900px;
        }

        .hero-text-overlay h1 {
            font-size: clamp(3rem, 6vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            color: #ffffff;
            line-height: 1.1;
        }

        .hero-text-overlay p {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: rgba(255, 255, 255, 0.85); 
            font-weight: 400;
        }

        /* === Bento Box Grid === */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 350px; 
            gap: 1.5rem;
        }

        .bento-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .bento-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.05);
        }

        .bento-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .bento-card:hover img {
            opacity: 0.8;
        }

        .card-content {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 3rem 2rem 2rem 2rem;
        }

        .card-brand {
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
        }

        .card-name {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .span-2-cols {
            grid-column: span 2;
        }

        /* Responsive Adjustments */
        @media (max-width: 1024px) {
            .bento-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .hero-section {
                height: 60vh;
            }
        }

        @media (max-width: 600px) {
            .bento-grid {
                grid-template-columns: 1fr;
            }
            .span-2-cols {
                grid-column: span 1; 
            }
            .top-nav {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header class="top-nav">
            <div class="logo">RENDER.</div>
            <ul class="nav-links">
                <li><a href="#">Work</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </header>

        <section class="hero-section">
            <video class="hero-video" autoplay loop muted playsinline>
                <source src="highlight reel 2026 (short).mp4" type="video/mp4">
            </video>
            
            <div class="hero-text-overlay">
                <h1>YOUR CREATIVE PARTNER</h1>
                <p>Complete Digital Production for Brands with a Vision.</p>
            </div>
        </section>

        <main class="bento-grid">
            
            <article class="bento-card span-2-cols">
                <img src="assets/kathleen-cameron.jpg" alt="Kathleen Cameron Brand Evolution Book">
                <div class="card-content">
                    <div class="card-brand">Brand Evolution</div>
                    <div class="card-name">Kathleen Cameron</div>
                </div>
            </article>

            <article class="bento-card">
                <img src="assets/jason-derulo.jpg" alt="Jason Derulo Concert Stage">
                <div class="card-content">
                    <div class="card-brand">Celebrity Production</div>
                    <div class="card-name">Jason Derulo</div>
                </div>
            </article>

            <article class="bento-card">
                <img src="assets/revenue-lab.jpg" alt="Revenue Lab Podcast Setup">
                <div class="card-content">
                    <div class="card-brand">Podcast Directing</div>
                    <div class="card-name">Revenue Lab</div>
                </div>
            </article>

            <article class="bento-card span-2-cols">
                <img src="assets/signature-summit.jpg" alt="Signature Summit Event Stage">
                <div class="card-content">
                    <div class="card-brand">Live Strategy</div>
                    <div class="card-name">Signature Summit</div>
                </div>
            </article>

        </main>
    </div>

</body>
</html>
