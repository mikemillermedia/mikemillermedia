<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Complete Digital Production for Brands with a Vision.">
    <title>Mike Miller Media | Your Creative Partner</title>
    
    <style>
        /* Base Dark Theme & Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050507; 
            color: #f5f5f7; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden; 
        }

        :root {
            /* Updated to a deeper, vibrant premium purple */
            --accent-color: #7b2cbf; 
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* === Top Navigation Header === */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem 2rem 1rem;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        /* === Top Hero Section === */
        .hero-section {
            height: 80vh;
            border-radius: 32px;
            position: relative;
            margin-bottom: 2rem;
            cursor: default;
            /* Added smooth transition for the hover glow */
            transition: box-shadow 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* The container holding the video needs overflow hidden to clip the video corners, 
           while the outer hero-section handles the glowing shadow */
        .video-container {
            width: 100%;
            height: 100%;
            border-radius: 32px;
            overflow: hidden;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Soft glow effect on hover */
        .hero-section:hover {
            box-shadow: 0 10px 50px rgba(123, 44, 191, 0.35); /* Deep purple glow */
            transform: translateY(-2px); /* Very slight lift */
        }

        .hero-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1; 
        }

        /* === Intro Statement Section === */
        .intro-section {
            text-align: center; 
            padding: 4rem 1rem 6rem 1rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .intro-section h1 {
            font-size: clamp(3rem, 6vw, 5rem); 
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            color: #ffffff;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .intro-section p {
            font-size: clamp(1.2rem, 2vw, 1.5rem);
            color: rgba(255, 255, 255, 0.7); 
            font-weight: 400;
        }

        /* === Page Sections & Headers === */
        .page-section {
            margin-bottom: 6rem;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-header h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .section-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
        }

        /* === Global CTA Button === */
        .cta-container {
            display: flex;
            justify-content: center;
            margin-top: 3rem;
        }

        .btn {
            background-color: #f5f5f7;
            color: #050507;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn:hover {
            background-color: var(--accent-color);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(123, 44, 191, 0.4);
        }

        /* === Bento Box Global Styles === */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .bento-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            /* Upgraded dynamic transitions */
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), background 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-decoration: none; 
            color: inherit;
        }

            transform: translateY(-8px) scale(1.01);
            background: rgba(255, 255, 255, 0.05);
