<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Highlight Header</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .header video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .header-content {
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        .highlight-text {
            color: #b19cd9;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .vision-text {
            font-size: 3rem;
            font-weight: bold;
        }

        .vision-text span {
            font-style: italic;
        }

        .project-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            width: 90%;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .card {
            background-color: #2e2e2e;
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card img {
            width: 100%;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .card-brand {
            font-size: 0.8rem;
            color: #b19cd9;
            margin-bottom: 0.2rem;
        }

        .card-name {
            font-size: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <video autoplay loop muted>
            <source src="highlight-reel.mp4" type="video/mp4">
        </video>
        <div class="header-content">
            <div class="highlight-text">HIGHLIGHT REEL // 2024</div>
            <div class="vision-text">RENDER YOUR <span>VISION.</span></div>
        </div>
    </div>
    <div class="project-cards">
        <div class="card">
            <img src="kathleen-cameron.jpg" alt="Kathleen Cameron Project">
            <div class="card-brand">BRAND EVOLUTION</div>
            <div class="card-name">KATHLEEN CAMERON</div>
        </div>
        <div class="card">
            <img src="jason-derulo.jpg" alt="Jason Derulo Project">
            <div class="card-brand">CELEBRITY PRODUCTION</div>
            <div class="card-name">JASON DERULO</div>
        </div>
        <div class="card">
            <img src="revenue-lab.jpg" alt="Revenue Lab Project">
            <div class="card-brand">PODCAST DIRECTING</div>
            <div class="card-name">REVENUE LAB</div>
        </div>
        <div class="card">
            <img src="signature-summit.jpg" alt="Signature Summit Project">
            <div class="card-brand">LIVE STRATEGY</div>
            <div class="card-name">SIGNATURE SUMMIT</div>
        </div>
    </div>
</body>
</html>
